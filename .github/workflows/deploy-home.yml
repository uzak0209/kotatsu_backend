name: Deploy Home Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOME_SERVER_HOST: ${{ secrets.HOME_SERVER_HOST }}
      HOME_SERVER_USER: ${{ secrets.HOME_SERVER_USER }}
      HOME_SERVER_SSH_PORT: ${{ secrets.HOME_SERVER_SSH_PORT }}
      HOME_SERVER_APP_DIR: ${{ secrets.HOME_SERVER_APP_DIR }}
      HOME_SERVER_SYSCTL: ${{ secrets.HOME_SERVER_SYSCTL }}
    steps:
      - uses: actions/checkout@v4
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOME_SERVER_SSH_KEY }}
      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          SSH_PORT="${HOME_SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "${SSH_PORT}" "${HOME_SERVER_HOST}" >> ~/.ssh/known_hosts
      - name: Write env file
        run: |
          printf '%s\n' '${{ secrets.HOME_SERVER_ENV }}' > .env.selfhost
      - name: Verify env file
        run: |
          echo "Checking .env.selfhost contents..."
          if grep -q "UDP_PUBLIC_URL" .env.selfhost; then
            echo "✓ UDP_PUBLIC_URL found in env file"
            grep "UDP_PUBLIC_URL" .env.selfhost | sed 's/=.*/=***/'
            if grep -Eq '^UDP_PUBLIC_URL=udp://[^[:space:]]+$' .env.selfhost; then
              echo "✓ UDP_PUBLIC_URL uses udp:// scheme"
            else
              echo "❌ UDP_PUBLIC_URL must use udp:// scheme"
              exit 1
            fi

            API_PORT_VALUE="$(awk -F= '/^API_PORT=/{print $2}' .env.selfhost | tail -n 1)"
            UDP_PORT_VALUE="$(awk -F= '/^UDP_PORT=/{print $2}' .env.selfhost | tail -n 1)"
            GRPC_PORT_VALUE="$(awk -F= '/^GRPC_PORT=/{print $2}' .env.selfhost | tail -n 1)"

            API_PORT_VALUE="${API_PORT_VALUE:-8080}"
            UDP_PORT_VALUE="${UDP_PORT_VALUE:-4433}"
            GRPC_PORT_VALUE="${GRPC_PORT_VALUE:-50051}"

            if [ "${UDP_PORT_VALUE}" = "${GRPC_PORT_VALUE}" ]; then
              echo "❌ UDP_PORT and GRPC_PORT must be different"
              exit 1
            fi
            if [ "${API_PORT_VALUE}" = "${UDP_PORT_VALUE}" ] || [ "${API_PORT_VALUE}" = "${GRPC_PORT_VALUE}" ]; then
              echo "❌ API_PORT must be different from UDP_PORT and GRPC_PORT"
              exit 1
            fi
            echo "✓ Port config sanity check passed"
          else
            echo "❌ UDP_PUBLIC_URL NOT found in env file"
            echo "File contains:"
            cat .env.selfhost | sed 's/=.*/=***/'
            exit 1
          fi
      - name: Write sysctl file
        if: ${{ env.HOME_SERVER_SYSCTL != '' }}
        run: |
          printf '%s\n' '${{ env.HOME_SERVER_SYSCTL }}' > .sysctl.selfhost
      - name: Deploy
        run: ./scripts/deploy-home.sh "${HOME_SERVER_HOST}" "${HOME_SERVER_USER}" "${HOME_SERVER_APP_DIR:-/home/${HOME_SERVER_USER}/kotatsu-backend}" "${HOME_SERVER_SSH_PORT:-22}"
      - name: Check container status
        run: |
          echo "Checking container status..."
          APP_DIR="${HOME_SERVER_APP_DIR:-/home/${HOME_SERVER_USER}/kotatsu-backend}"
          ssh -p "${HOME_SERVER_SSH_PORT:-22}" "${HOME_SERVER_USER}@${HOME_SERVER_HOST}" "APP_DIR='${APP_DIR}' sh -s" <<'REMOTE'
            set -eu

            failed=0

            echo 'Checking listeners for 8080/tcp, 4433/udp, 50051/tcp:'
            if command -v ss >/dev/null 2>&1; then
              ss -lntup | grep -E '(:8080|:4433|:50051)' || echo 'No matching listeners'
            else
              netstat -lntup 2>/dev/null | grep -E '(:8080|:4433|:50051)' || echo 'No matching listeners'
            fi
            echo ''

            if command -v podman >/dev/null 2>&1; then
              echo 'Running containers:'
              podman ps
              echo ''
              echo 'All containers (including stopped):'
              podman ps -a
              echo ''
              echo 'Realtime server logs (last 50 lines):'
              podman logs kotatsu-backend-realtime --tail 50 2>&1 || true
              echo ''
              echo 'API server logs (last 50 lines):'
              podman logs kotatsu-backend-api --tail 50 2>&1 || true

              if ! podman inspect -f '{{.State.Running}}' kotatsu-backend-realtime 2>/dev/null | grep -qx true; then
                echo 'ERROR: realtime container is not running'
                failed=1
              fi
              if ! podman inspect -f '{{.State.Running}}' kotatsu-backend-api 2>/dev/null | grep -qx true; then
                echo 'ERROR: api container is not running'
                failed=1
              fi
            else
              echo 'Running containers:'
              docker ps
              echo ''
              echo 'All containers (including stopped):'
              docker ps -a
              echo ''
              echo 'Realtime server logs (last 50 lines):'
              docker logs realtime --tail 50 2>&1 || docker compose -f "${APP_DIR}/docker-compose.yml" logs realtime --tail 50 || true
              echo ''
              echo 'API server logs (last 50 lines):'
              docker logs api --tail 50 2>&1 || docker compose -f "${APP_DIR}/docker-compose.yml" logs api --tail 50 || true

              running_services="$(docker compose -f "${APP_DIR}/docker-compose.yml" ps --status running --services 2>/dev/null || true)"
              if ! printf '%s\n' "${running_services}" | grep -qx realtime; then
                echo 'ERROR: realtime service is not running'
                failed=1
              fi
              if ! printf '%s\n' "${running_services}" | grep -qx api; then
                echo 'ERROR: api service is not running'
                failed=1
              fi
            fi

            if ! curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo 'ERROR: API health check failed'
              failed=1
            else
              echo 'API health check: OK'
            fi

            if [ "${failed}" -ne 0 ]; then
              echo 'Deployment health check failed'
              exit 1
            fi
          REMOTE
