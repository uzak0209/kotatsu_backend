syntax = "proto3";

package kotatsu.controlplane.v1;

service ControlPlane {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse);
  rpc IssueJoinTicket(IssueJoinTicketRequest) returns (IssueJoinTicketResponse);
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse);
  rpc StartRoom(StartRoomRequest) returns (StartRoomResponse);
  rpc FinishRoom(FinishRoomRequest) returns (FinishRoomResponse);
  rpc DeleteRoom(DeleteRoomRequest) returns (DeleteRoomResponse);
}

message CreateRoomRequest {}

message CreateRoomResponse {
  string match_id = 1;
  uint32 max_players = 2;
}

message ListRoomsRequest {}

message IssueJoinTicketRequest {
  string match_id = 1;
  string display_name = 2;
}

message IssueJoinTicketResponse {
  string match_id = 1;
  string player_id = 2;
  string token = 3;
  uint64 token_expires_at_unix = 4;
  string udp_url = 5;
}

message GetRoomRequest {
  string match_id = 1;
}

message RoomPlayer {
  string player_id = 1;
  string display_name = 2;
  uint32 gravity = 3;
  uint32 friction = 4;
  uint32 speed = 5;
  uint64 next_param_change_at_unix = 6;
}

message GetRoomResponse {
  string match_id = 1;
  uint32 max_players = 2;
  repeated RoomPlayer players = 3;
  uint64 started_at_unix = 4;
}

message RoomSummary {
  string match_id = 1;
  uint32 max_players = 2;
  repeated RoomPlayer players = 3;
  uint64 started_at_unix = 4;
}

message ListRoomsResponse {
  repeated RoomSummary rooms = 1;
}

message DeleteRoomRequest {
  string match_id = 1;
}

message DeleteRoomResponse {}

message StartRoomRequest {
  string match_id = 1;
}

message StartRoomResponse {
  string match_id = 1;
  uint64 started_at_unix = 2;
}

message FinishRoomRequest {
  string match_id = 1;
  string player_id = 2;
}

message FinishRoomResponse {
  string match_id = 1;
  string player_id = 2;
  uint32 rank = 3;
  uint32 finished_player_count = 4;
  uint32 total_players = 5;
}
