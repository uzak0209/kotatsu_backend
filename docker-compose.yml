services:
  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    env_file:
      - .env.selfhost
    restart: unless-stopped
    environment:
      GRPC_ADDR: 0.0.0.0:${GRPC_PORT:-50051}
      UDP_BIND_ADDR: 0.0.0.0:${UDP_PORT:-4433}
      UDP_PUBLIC_URL: ${UDP_PUBLIC_URL:-udp://127.0.0.1:4433}
    ports:
      - "${UDP_PORT:-4433}:${UDP_PORT:-4433}/udp"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.selfhost
    restart: unless-stopped
    depends_on:
      - realtime
    environment:
      API_ADDR: 0.0.0.0:${API_PORT:-8080}
      CONTROL_PLANE_URL: http://realtime:${GRPC_PORT:-50051}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
